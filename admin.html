<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Dashboard | Eagle Studio</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<header class="header">
  <div class="brand">
    <img src="images/logo.jpg" alt="Eagle Studio Logo" class="brand-logo">
    <span>Eagle Studio</span>
</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<main class="admin-page">

  <!-- Admin login section -->
  <section id="adminLoginSection" class="admin-login-card">
    <h1>Admin Login</h1>

    <p>Enter the admin password to view customer orders.</p>

    <form id="adminLoginForm">
      <label for="adminPassword">Admin Password</label>

      <input
        type="password"
        id="adminPassword"
        placeholder="Enter admin password"
        required
      />

      <button type="submit">Login as Admin</button>
    </form>

    <p id="adminLoginError" class="error-message"></p>
  </section>


  <!-- Admin dashboard -->
  <section id="adminDashboard" class="admin-dashboard hidden">

    <div class="admin-dashboard-header">
      <div>
        <h1>Welcome, Admin</h1>
        <p>Customer orders received by Eagle Studio</p>
      </div>

      <button
        type="button"
        class="admin-logout-button"
        onclick="adminLogout()"
      >
        Sign Out
      </button>
    </div>

    <div id="adminOrders">
      <p>Loading orders...</p>
    </div>

  </section>

</main>

<script src="supabase-config.js"></script>
<script src="app.js"></script>

</body>
</html>
