<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Eagle Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="header">
  <div class="brand">
    <img src="images/logo.png" alt="Eagle Studio Logo" class="brand-logo">
    <span>Eagle Studio</span>
</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="login.html">Login</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<main class="auth-page">
  <section class="auth-card">
    <h1>Create Account</h1>

    <form id="registerForm">
      <label for="registerFirstName">First Name</label>
      <input type="text" id="registerFirstName" autocomplete="given-name" required />

      <label for="registerLastName">Last Name</label>
      <input type="text" id="registerLastName" autocomplete="family-name" required />

      <label for="registerPhone">Phone Number</label>
      <input type="tel" id="registerPhone" autocomplete="tel" minlength="10" required />

      <label for="registerEmail">Email Address</label>
      <input type="email" id="registerEmail" autocomplete="email" required />

      <label for="registerPassword">Password</label>
      <input type="password" id="registerPassword" autocomplete="new-password" minlength="6" required />

      <label for="registerConfirmPassword">Confirm Password</label>
      <input type="password" id="registerConfirmPassword" autocomplete="new-password" minlength="6" required />

      <button type="submit">Create Account</button>
      <p id="registerError" class="error-message"></p>
    </form>

    <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
  </section>
</main>

<script src="supabase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
