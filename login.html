<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Eagle Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="header">
  <div class="brand">
    <img src="images/logo.jpg" alt="Eagle Studio Logo" class="brand-logo">
    <span>Eagle Studio</span>
</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="login.html">Login</a>
    <a href="admin.html">Admin</a>
  </nav>
</header>

<main class="auth-page">
  <section class="auth-card">
    <h1>Customer Login</h1>

    <form id="loginForm">
      <label for="loginEmail">Email Address</label>
      <input type="email" id="loginEmail" autocomplete="email" required />

      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" autocomplete="current-password" required />

      <button type="submit">Login</button>
      <p id="loginError" class="error-message"></p>
    </form>

    <p class="auth-link">Do not have an account? <a href="register.html">Create Account</a></p>
  </section>
</main>

<script src="supabase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
